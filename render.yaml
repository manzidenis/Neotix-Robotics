services:
  - type: web
    name: neotrix-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATASET_BASE_PATH
        value: /app/data
      - key: CORS_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_UPLOAD_PREFIX
        value: uploads
      - key: R2_PUBLIC_DATASET_PREFIX
        value: public-data
      - key: R2_MULTIPART_PART_SIZE_MB
        value: "32"
      - key: R2_INGEST_MAX_CONCURRENCY
        value: "4"
      - key: R2_FOLDER_MULTIPART_THRESHOLD_MB
        value: "64"
      - key: PUBLIC_DEMO_DATASET_NAMES
        value: ball_to_cup,dirty_towels
