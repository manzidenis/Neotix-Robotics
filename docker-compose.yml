services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: neotix-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - neotix-db:/app/db
    environment:
      - DATASET_BASE_PATH=/app/data
      - DATABASE_URL=sqlite:////app/db/neotix.db
      - SECRET_KEY=${SECRET_KEY:-neotix-secret-change-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: neotix-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neotix-db:
